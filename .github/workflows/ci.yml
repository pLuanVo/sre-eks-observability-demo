name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".mcp.json"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.apps }}
      infra: ${{ steps.filter.outputs.infra }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            apps:
              - "apps/**"
              - "mcp-server/**"
            infra:
              - "infra/**"
            k8s:
              - "k8s/**"
              - "observability/**"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/api-gateway/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/order-service/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: apps/payment-service/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: mcp-server/Dockerfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint Python
        run: |
          pip install ruff
          ruff check apps/ mcp-server/

      - name: Lint YAML
        run: |
          pip install yamllint
          yamllint -d relaxed k8s/ observability/ sre/

  build-push:
    needs: [changes, lint]
    if: github.event_name == 'push' && needs.changes.outputs.apps == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.ecr-login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-build-${{ github.run_number }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          for svc in api-gateway order-service payment-service; do
            echo "Building $svc..."
            docker build -t "$ECR_REGISTRY/sre-demo/$svc:$IMAGE_TAG" "apps/$svc/"
            docker push "$ECR_REGISTRY/sre-demo/$svc:$IMAGE_TAG"
          done

          echo "Building mcp-server..."
          docker build -t "$ECR_REGISTRY/sre-demo/mcp-server:$IMAGE_TAG" -f mcp-server/Dockerfile .
          docker push "$ECR_REGISTRY/sre-demo/mcp-server:$IMAGE_TAG"

      - name: Trivy vulnerability scan
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          for svc in api-gateway order-service payment-service mcp-server; do
            echo "Scanning $svc..."
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy image --severity CRITICAL,HIGH --exit-code 1 \
              "$ECR_REGISTRY/sre-demo/$svc:$IMAGE_TAG"
          done

  deploy:
    needs: [changes, build-push]
    if: >-
      github.event_name == 'push' &&
      (needs.changes.outputs.k8s == 'true' || needs.build-push.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-deploy-${{ github.run_number }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Update Kustomize image tags
        if: needs.build-push.result == 'success'
        env:
          ECR_REGISTRY: ${{ needs.build-push.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}
        run: |
          cd k8s/overlays/production
          sed -i "s|ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com|$ECR_REGISTRY|g" kustomization.yaml
          sed -i "s|REPLACE_WITH_TAG|$IMAGE_TAG|g" kustomization.yaml

      - name: Deploy to EKS
        run: kubectl apply -k k8s/overlays/production/

      - name: Verify rollout
        run: |
          for deploy in api-gateway order-service payment-service mcp-server; do
            kubectl rollout status deployment/$deploy -n demo --timeout=120s
          done
