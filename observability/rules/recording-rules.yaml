apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: recording-rules
  namespace: observability
  labels:
    app.kubernetes.io/name: recording-rules
    app.kubernetes.io/part-of: sre-demo
spec:
  groups:
    - name: sli_recording_rules
      interval: 30s
      rules:
        # Availability SLI: ratio of successful requests (non-5xx)
        - record: sli:availability:rate5m
          expr: |
            1 - (
              sum(rate(http_requests_total{code=~"5.."}[5m])) by (service)
              /
              sum(rate(http_requests_total[5m])) by (service)
            )

        # Latency SLI: p99 request duration
        - record: sli:latency:rate5m
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
            )

        # Latency SLI: p95 request duration
        - record: sli:latency_p95:rate5m
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
            )

        # Error rate by service
        - record: sli:error_rate:rate5m
          expr: |
            sum(rate(http_requests_total{code=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)

        # Request rate by service
        - record: sli:request_rate:rate5m
          expr: |
            sum(rate(http_requests_total[5m])) by (service)

        # Multi-window burn rate for 5m / 1h windows (critical)
        - record: sli:error_budget_burn:rate5m
          expr: |
            sum(rate(http_requests_total{code=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            / 0.001

        - record: sli:error_budget_burn:rate1h
          expr: |
            sum(rate(http_requests_total{code=~"5.."}[1h])) by (service)
            /
            sum(rate(http_requests_total[1h])) by (service)
            / 0.001

        # Multi-window burn rate for 30m / 6h windows (warning)
        - record: sli:error_budget_burn:rate30m
          expr: |
            sum(rate(http_requests_total{code=~"5.."}[30m])) by (service)
            /
            sum(rate(http_requests_total[30m])) by (service)
            / 0.001

        - record: sli:error_budget_burn:rate6h
          expr: |
            sum(rate(http_requests_total{code=~"5.."}[6h])) by (service)
            /
            sum(rate(http_requests_total[6h])) by (service)
            / 0.001
