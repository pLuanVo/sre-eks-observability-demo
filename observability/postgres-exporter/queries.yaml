apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-exporter-queries
  namespace: demo
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/part-of: sre-demo
data:
  queries.yaml: |
    pg_stat_statements:
      query: |
        SELECT
          queryid,
          LEFT(query, 100) AS query_text,
          calls,
          total_exec_time AS total_time_ms,
          mean_exec_time AS mean_time_ms,
          rows
        FROM pg_stat_statements
        ORDER BY total_exec_time DESC
        LIMIT 20
      master: true
      metrics:
        - queryid:
            usage: "LABEL"
            description: "Query ID"
        - query_text:
            usage: "LABEL"
            description: "Query text (truncated)"
        - calls:
            usage: "COUNTER"
            description: "Number of times executed"
        - total_time_ms:
            usage: "COUNTER"
            description: "Total time spent in the statement (ms)"
        - mean_time_ms:
            usage: "GAUGE"
            description: "Mean time per execution (ms)"
        - rows:
            usage: "COUNTER"
            description: "Total number of rows retrieved or affected"

    pg_stat_activity:
      query: |
        SELECT
          state,
          COUNT(*) AS connections,
          COALESCE(usename, 'unknown') AS usename
        FROM pg_stat_activity
        WHERE pid <> pg_backend_pid()
        GROUP BY state, usename
      master: true
      metrics:
        - state:
            usage: "LABEL"
            description: "Connection state"
        - usename:
            usage: "LABEL"
            description: "Database user"
        - connections:
            usage: "GAUGE"
            description: "Number of connections by state"

    pg_locks:
      query: |
        SELECT
          mode,
          locktype,
          COUNT(*) AS count
        FROM pg_locks
        GROUP BY mode, locktype
      master: true
      metrics:
        - mode:
            usage: "LABEL"
            description: "Lock mode"
        - locktype:
            usage: "LABEL"
            description: "Lock type"
        - count:
            usage: "GAUGE"
            description: "Number of locks"

    pg_stat_user_tables:
      query: |
        SELECT
          schemaname,
          relname,
          seq_scan,
          seq_tup_read,
          idx_scan,
          idx_tup_fetch,
          n_tup_ins,
          n_tup_upd,
          n_tup_del,
          n_live_tup,
          n_dead_tup,
          last_vacuum,
          last_autovacuum,
          last_analyze,
          last_autoanalyze
        FROM pg_stat_user_tables
      master: true
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - relname:
            usage: "LABEL"
            description: "Table name"
        - seq_scan:
            usage: "COUNTER"
            description: "Number of sequential scans"
        - seq_tup_read:
            usage: "COUNTER"
            description: "Number of live rows fetched by sequential scans"
        - idx_scan:
            usage: "COUNTER"
            description: "Number of index scans"
        - idx_tup_fetch:
            usage: "COUNTER"
            description: "Number of live rows fetched by index scans"
        - n_tup_ins:
            usage: "COUNTER"
            description: "Number of rows inserted"
        - n_tup_upd:
            usage: "COUNTER"
            description: "Number of rows updated"
        - n_tup_del:
            usage: "COUNTER"
            description: "Number of rows deleted"
        - n_live_tup:
            usage: "GAUGE"
            description: "Estimated number of live rows"
        - n_dead_tup:
            usage: "GAUGE"
            description: "Estimated number of dead rows"
        - last_vacuum:
            usage: "GAUGE"
            description: "Last time table was vacuumed"
        - last_autovacuum:
            usage: "GAUGE"
            description: "Last time table was auto-vacuumed"
        - last_analyze:
            usage: "GAUGE"
            description: "Last time table was analyzed"
        - last_autoanalyze:
            usage: "GAUGE"
            description: "Last time table was auto-analyzed"
