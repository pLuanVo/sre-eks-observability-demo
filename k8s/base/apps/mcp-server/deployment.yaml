apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: demo
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/part-of: sre-demo
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-server
        app.kubernetes.io/part-of: sre-demo
        app.kubernetes.io/component: mcp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: demo-app
      containers:
        - name: mcp-server
          image: mcp-server:latest
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
            - containerPort: 8091
              name: webhook
              protocol: TCP
          env:
            - name: VM_URL
              value: "http://vmsingle-victoria-metrics.observability:8429"
            - name: GRAFANA_URL
              value: "http://grafana.observability:3000"
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGHOST
            - name: PGPORT
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGPORT
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGUSER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGPASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: PGDATABASE
            - name: K8S_NAMESPACE
              value: "demo"
            - name: RUNBOOK_DIR
              value: "/app/runbooks"
            - name: WEBHOOK_URL
              value: "http://mcp-server.demo:8090/webhook"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: webhook
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
