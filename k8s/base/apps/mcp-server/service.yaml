apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: demo
  labels:
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/part-of: sre-demo
spec:
  selector:
    app.kubernetes.io/name: mcp-server
  ports:
    - port: 8090
      targetPort: http
      protocol: TCP
      name: http
    - port: 8091
      targetPort: webhook
      protocol: TCP
      name: webhook
