apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: demo
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: sre-demo
spec:
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
